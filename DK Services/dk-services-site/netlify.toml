# Netlify configuration for the D&K Services website
# This is a static site — no build step required.

[build]
  # The site files live in the root of this folder.
  publish = "."
  command = ""

# Long-cache the images & logos (they rarely change).
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security + content headers for the HTML.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
