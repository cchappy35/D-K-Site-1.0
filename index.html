<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DK Diesel | Diesel &amp; Gas Repair | Waco, GA</title>
  <meta name="description" content="D&K Services Co. — Waco's premier diesel and gas vehicle repair and performance shop. 40+ years combined experience." />
  <link rel="icon" type="image/png" href="uploads/dk-logo.png" />
  <link rel="apple-touch-icon" href="uploads/dk-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { background: #111111; color: #ffffff; font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; }
    /* Kill the blue tap-flash on touch, keep our own hover/active states */
    a, button { -webkit-tap-highlight-color: rgba(216,36,50,0.18); }
    :root {
      --accent: #d82432;
      --base: #111111;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2d2d2d;
      --text: #ffffff;
      --muted: #888888;
      --light: #cccccc;
    }
    ::selection { background: var(--accent); color: #fff; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; object-fit: cover; }
    button { cursor: pointer; border: none; outline: none; font-family: inherit; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

    /* Placeholders */
    .img-placeholder { position: relative; overflow: hidden; background: #1a1a1a; }
    .img-placeholder svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .img-placeholder .ph-label {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Courier New', monospace; font-size: 11px; color: #555;
      text-align: center; padding: 12px; line-height: 1.5; z-index: 1;
    }

    /* Gallery grid */
    .gallery-grid {
      display: grid;
      gap: 3px;
      grid-template-columns: repeat(4, 1fr);
    }
    @media (max-width: 1023px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 767px)  { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 374px)  { .gallery-grid { grid-template-columns: 1fr; } }

    /* Trust bar horizontal scroll on mobile, with edge-fade hint */
    .trust-wrap { position: relative; }
    .trust-scroll {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .trust-scroll::-webkit-scrollbar { display: none; }
    .trust-item { flex: 0 0 auto; }
    .trust-fade {
      position: absolute; top: 0; right: 0; bottom: 0; width: 36px; pointer-events: none;
      background: linear-gradient(to right, rgba(10,10,10,0), #0a0a0a);
      display: none;
    }
    @media (max-width: 900px) { .trust-fade { display: block; } }

    /* Brands strip scroll on mobile */
    .brands-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      justify-content: center;
    }
    @media (max-width: 599px) {
      .brands-strip {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .brands-strip > * { min-width: 0 !important; max-width: none !important; }
      .brands-strip > *:last-child:nth-child(odd) { grid-column: 1 / -1; justify-self: center; width: calc(50% - 4px); }
      .service-card { padding-top: 16px !important; padding-bottom: 16px !important; }
      .team-grid { grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
    }

    /* Form grid stacks on mobile */
    .form-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    @media (max-width: 599px) { .form-two-col { grid-template-columns: 1fr; gap: 0; } }

    /* Form inputs use a fixed 16px font-size (set inline) so iOS never auto-zooms on focus */

    /* Touch devices: surface the gallery 'expand' affordance since there is no hover */
    @media (hover: none) {
      .gallery-thumb-hint { opacity: 1 !important; }
    }

    /* Nav */
    @media (max-width: 768px) { .desktop-nav { display: none !important; } }
    @media (min-width: 769px) { .mobile-nav { display: none !important; } }

    /* Hero height */
    #home { height: 100svh; min-height: 560px; }
    @supports not (height: 100svh) { #home { height: 100vh; } }

    /* Section padding scales down */
    .section-pad { padding: clamp(60px, 8vw, 100px) 0; }
    .section-pad-sm { padding: clamp(48px, 6vw, 80px) 0; }

    /* Tap targets */
    button, a { min-height: 44px; }
    nav button, nav a { min-height: 44px; display: inline-flex; align-items: center; }

    /* Prevent body scroll when lightbox open */
    body.lb-open { overflow: hidden; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">


const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#d82432",
  "headingFont": "Bebas Neue",
  "darkBase": "#111111",
  "heroHeadline": "Waco's Diesel Experts",
  "heroSub": "Performance, Repair & Fleet Care",
  "showTrustBar": true
} /*EDITMODE-END*/;

/* ─── HELPERS ─────────────────────────────────────────── */
function u(name) {return 'uploads/' + encodeURIComponent(name);}

function ImgPlaceholder({ label, style = {}, className = "", src, fit = 'cover', objPos = 'center', scale = 1 }) {
  const [failed, setFailed] = React.useState(false);
  const key = label.replace(/\W/g, '').slice(0, 6) || 'ph';
  if (src && !failed) {
    return (
      <div className={`img-placeholder ${className}`} style={style}>
        <img src={src} alt={label.replace(/\n/g, ' ')} loading="lazy"
        onError={() => setFailed(true)}
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: fit, objectPosition: objPos, transform: scale !== 1 ? `scale(${scale})` : undefined, transformOrigin: objPos }} />
      </div>);

  }
  return (
    <div className={`img-placeholder ${className}`} style={style}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id={`s-${key}`} patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
            <rect width="4" height="8" fill="#222" />
            <rect x="4" width="4" height="8" fill="#1a1a1a" />
          </pattern>
        </defs>
        <rect width="100" height="100" fill={`url(#s-${key})`} />
      </svg>
      <div className="ph-label">{label}</div>
    </div>);

}

function Icon({ name, size = 20 }) {
  const icons = {
    wrench: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" /></svg>,
    engine: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v4" /><line x1="12" y1="11" x2="12" y2="16" /><line x1="8" y1="13" x2="8" y2="16" /><line x1="16" y1="13" x2="16" y2="16" /></svg>,
    truck: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 17H3V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3" /><path d="M14 8h8l-2 9H14V8z" /><circle cx="7.5" cy="17.5" r="2.5" /><circle cx="19.5" cy="17.5" r="2.5" /></svg>,
    bolt: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>,
    shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,
    gear: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" /></svg>,
    thermo: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" /></svg>,
    transmission: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="5" cy="6" r="3" /><circle cx="19" cy="6" r="3" /><circle cx="12" cy="18" r="3" /><line x1="5" y1="9" x2="5" y2="18" /><line x1="19" y1="9" x2="12" y2="15" /></svg>,
    diff: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4" /><line x1="2" y1="12" x2="8" y2="12" /><line x1="16" y1="12" x2="22" y2="12" /><line x1="12" y1="2" x2="12" y2="8" /><line x1="12" y1="16" x2="12" y2="22" /></svg>,
    ac: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07" /></svg>,
    steering: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="3" /><line x1="12" y1="9" x2="12" y2="2" /><line x1="9.41" y1="9.41" x2="4.22" y2="4.22" /><line x1="14.59" y1="9.41" x2="19.78" y2="4.22" /></svg>,
    phone: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.9-.9a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" /></svg>,
    mail: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></svg>,
    pin: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>,
    clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>,
    menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></svg>,
    x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>,
    chevronL: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6" /></svg>,
    chevronR: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>,
    expand: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 3 21 3 21 9" /><polyline points="9 21 3 21 3 15" /><line x1="21" y1="3" x2="14" y2="10" /><line x1="3" y1="21" x2="10" y2="14" /></svg>
  };
  return icons[name] || null;
}

/* ─── NAV ─────────────────────────────────────────────── */
function Nav({ accent }) {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const links = ['Services', 'Gallery', 'About Us', 'Fleet Services', 'Contact'];

  function scrollToSection(id) {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.pageYOffset - 70;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
    setMenuOpen(false);
  }

  const navStyle = {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
    background: scrolled ? 'rgba(10,10,10,0.97)' : 'transparent',
    borderBottom: scrolled ? '1px solid #2d2d2d' : '1px solid transparent',
    transition: 'background 0.3s, border-color 0.3s',
    backdropFilter: scrolled ? 'blur(8px)' : 'none'
  };

  return (
    <nav style={navStyle}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 clamp(16px,3vw,24px)', height: 70, display: 'flex', alignItems: 'center', gap: 24 }}>
        {/* Logo */}
        <div style={{ flex: '0 0 auto', cursor: 'pointer', minHeight: 44, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}
        onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
          <div style={{ fontFamily: 'Bebas Neue, sans-serif', fontSize: 'clamp(22px,3vw,28px)', letterSpacing: '0.05em', lineHeight: 1 }}>
            <span style={{ color: accent }}>DK</span><span style={{ color: '#fff' }}> DIESEL</span>
          </div>
          <div style={{ fontFamily: 'Barlow Condensed, sans-serif', fontSize: 10, letterSpacing: '0.2em', color: '#888', marginTop: 1 }}>D&K SERVICES CO. · WACO, GA</div>
        </div>

        {/* Desktop links */}
        <div style={{ flex: 1, display: 'flex', gap: 'clamp(16px,2vw,32px)', justifyContent: 'center', alignItems: 'center' }} className="desktop-nav">
          {links.map((link) =>
          <button key={link}
          onClick={() => scrollToSection(link.toLowerCase().replace(/\s+/g, '-'))}
          style={{ background: 'none', color: '#ccc', fontFamily: 'Barlow Condensed, sans-serif', fontSize: 14, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', padding: '4px 0', borderBottom: '2px solid transparent', transition: 'color 0.2s, border-color 0.2s', cursor: 'pointer', minHeight: 44, display: 'flex', alignItems: 'center' }}
          onMouseEnter={(e) => {e.currentTarget.style.color = '#fff';e.currentTarget.style.borderColor = accent;}}
          onMouseLeave={(e) => {e.currentTarget.style.color = '#ccc';e.currentTarget.style.borderColor = 'transparent';}}>
            {link}</button>
          )}
        </div>

        {/* CTA */}
        <div className="desktop-nav">
          <a href="tel:7708913478"
          style={{ background: accent, color: '#fff', fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 700, fontSize: 14, letterSpacing: '0.12em', textTransform: 'uppercase', padding: '10px 20px', display: 'inline-flex', alignItems: 'center', minHeight: 44, transition: 'filter 0.2s' }}
          onMouseEnter={(e) => e.currentTarget.style.filter = 'brightness(1.15)'}
          onMouseLeave={(e) => e.currentTarget.style.filter = 'brightness(1)'}>
            Call Us Now</a>
        </div>

        {/* Hamburger */}
        <button onClick={() => setMenuOpen(!menuOpen)} className="mobile-nav"
        style={{ background: 'none', color: '#fff', marginLeft: 'auto', padding: 8, minHeight: 44, minWidth: 44, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name={menuOpen ? 'x' : 'menu'} size={24} />
        </button>
      </div>

      {/* Mobile menu */}
      {menuOpen &&
      <div style={{ background: '#0a0a0a', borderTop: '1px solid #2d2d2d', padding: '8px 24px 24px' }}>
          {links.map((link) =>
        <button key={link}
        onClick={() => scrollToSection(link.toLowerCase().replace(/\s+/g, '-'))}
        style={{ display: 'flex', alignItems: 'center', width: '100%', textAlign: 'left', background: 'none', color: '#ccc', fontFamily: 'Barlow Condensed, sans-serif', fontSize: 18, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', padding: '13px 0', borderBottom: '1px solid #1e1e1e', minHeight: 50 }}>
              {link}
            </button>
        )}
          <a href="tel:7708913478"
        style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: 20, background: accent, color: '#fff', fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 700, fontSize: 16, letterSpacing: '0.12em', textTransform: 'uppercase', padding: '14px 24px', minHeight: 50 }}>
            Call Us Now
          </a>
        </div>
      }
    </nav>);

}

/* ─── HERO ────────────────────────────────────────────── */
function Hero({ accent, headline, sub }) {
  function scrollToSection(id) {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 70, behavior: 'smooth' });
  }
  return (
    <section id="home" style={{ position: 'relative', display: 'flex', alignItems: 'center' }}>
      <div style={{ position: 'absolute', inset: 0, zIndex: 0 }}>
        <ImgPlaceholder src={u('Hero Image-e220f5c5.JPG')} objPos="center 42%" label={"HIGH-QUALITY PHOTO\nDiesel truck in shop bay\nor mechanic working on engine\n(client photo or stock)"} style={{ width: '100%', height: '100%' }} />
        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(135deg, rgba(10,10,10,0.96) 0%, rgba(10,10,10,0.82) 60%, rgba(10,10,10,0.92) 100%)' }} />
      </div>
      <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 5, background: accent, zIndex: 2 }} />
      <div style={{ position: 'relative', zIndex: 1, maxWidth: 1280, margin: '0 auto', padding: 'clamp(80px,10vw,120px) clamp(24px,5vw,48px) clamp(48px,6vw,80px)', width: '100%' }}>
        <div style={{ fontFamily: 'Barlow Condensed, sans-serif', fontSize: 'clamp(11px,1.2vw,13px)', fontWeight: 600, letterSpacing: '0.25em', color: accent, textTransform: 'uppercase', marginBottom: 16 }}>
          Waco, GA · Diesel &amp; Gas Vehicle Repair
        </div>
        <h1 style={{ fontFamily: 'Bebas Neue, sans-serif', fontSize: 'clamp(40px,5.5vw,72px)', lineHeight: 1, letterSpacing: '0.02em', marginBottom: 8, maxWidth: 800 }}>
          {headline}<br /><span style={{ color: accent }}>{sub}</span>
        </h1>
        <p style={{ fontSize: 'clamp(15px,1.5vw,18px)', color: '#ccc', maxWidth: 520, marginBottom: 36, marginTop: 20, lineHeight: 1.7 }}>
          Over 40 years of combined experience keeping your truck running at its peak — from routine maintenance to high-performance builds.
        </p>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
          <button onClick={() => scrollToSection('contact')}
          style={{ background: accent, color: '#fff', fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 700, fontSize: 'clamp(14px,1.4vw,16px)', letterSpacing: '0.1em', textTransform: 'uppercase', padding: 'clamp(13px,1.5vw,16px) clamp(24px,3vw,36px)', minHeight: 50, transition: 'filter 0.2s' }}
          onMouseEnter={(e) => e.currentTarget.style.filter = 'brightness(1.15)'}
          onMouseLeave={(e) => e.currentTarget.style.filter = 'brightness(1)'}>
            Schedule Service</button>
          <button onClick={() => scrollToSection('services')}

function GalleryLightbox({ items, startIndex, onClose, accent }) {
  const [idx, setIdx] = React.useState(startIndex);
  const touchStartX = React.useRef(null);

  React.useEffect(() => {
    document.body.classList.add('lb-open');
    const handler = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') setIdx((i) => (i - 1 + items.length) % items.length);
      if (e.key === 'ArrowRight') setIdx((i) => (i + 1) % items.length);
    };
    window.addEventListener('keydown', handler);
    return () => {window.removeEventListener('keydown', handler);document.body.classList.remove('lb-open');};
  }, []);

  function prev() {setIdx((i) => (i - 1 + items.length) % items.length);}
  function next() {setIdx((i) => (i + 1) % items.length);}

  function onTouchStart(e) {touchStartX.current = e.touches[0].clientX;}
  function onTouchEnd(e) {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) > 50) {dx < 0 ? next() : prev();}
    touchStartX.current = null;
  }

  const item = items[idx];
  return (
    <div onClick={onClose} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
    style={{ position: 'fixed', inset: 0, zIndex: 9000, background: 'rgba(0,0,0,0.95)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      {/* Close */}
      <button onClick={onClose}
      style={{ position: 'absolute', top: 20, right: 20, background: 'rgba(255,255,255,0.1)', color: '#fff', padding: 10, minHeight: 44, minWidth: 44, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2 }}>
        <Icon name="x" size={22} />
      </button>
      {/* Counter */}
      <div style={{ position: 'absolute', top: 24, left: '50%', transform: 'translateX(-50%)', fontFamily: 'Barlow Condensed, sans-serif', fontSize: 14, letterSpacing: '0.15em', color: '#888', zIndex: 2 }}>
        {idx + 1} / {items.length}
      </div>
      {/* Prev */}
      <button onClick={(e) => {e.stopPropagation();prev();}}
      style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', background: 'rgba(255,255,255,0.08)', color: '#fff', padding: 12, minHeight: 52, minWidth: 52, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2, transition: 'background 0.2s' }}
      onMouseEnter={(e) => e.currentTarget.style.background = `${accent}33`}
      onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(255,255,255,0.08)'}>
        <Icon name="chevronL" size={28} /></button>
      {/* Image */}
      <div onClick={(e) => e.stopPropagation()}
      style={{ maxWidth: 'min(90vw, 900px)', maxHeight: '80vh', width: '100%' }}>
        <ImgPlaceholder src={u(item.img)} fit="contain" label={`PHOTO PLACEHOLDER\n${item.label}`}
        style={{ width: '100%', aspectRatio: '4/3', maxHeight: '80vh', border: `2px solid ${accent}` }} />
      </div>
      {/* Next */}
      <button onClick={(e) => {e.stopPropagation();next();}}
      style={{ position: 'absolute', right: 16, top: '50%', transform: 'translateY(-50%)', background: 'rgba(255,255,255,0.08)', color: '#fff', padding: 12, minHeight: 52, minWidth: 52, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 2, transition: 'background 0.2s' }}
      onMouseEnter={(e) => e.currentTarget.style.background = `${accent}33`}

        <Icon name="chevronR" size={28} /></button>
    </div>);

}

/* ─── CONTACT ─────────────────────────────────────────── */
function Contact({ accent }) {
  const WEB3FORMS_ACCESS_KEY = 'f5e92126-1a47-47b2-a86a-8a10601fbc76'; // Web3Forms key → bellis@dkservicesco.com

  const [form, setForm] = React.useState({ name: '', phone: '', email: '', vehicle: '', service: '', message: '' });
  const [submitted, setSubmitted] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const [submitError, setSubmitError] = React.useState('');
  const [errors, setErrors] = React.useState({});

  function validate() {
    const e = {};
    if (!form.name.trim()) e.name = 'Required';
    if (!form.email.trim()) e.email = 'Required';else
    if (!/\S+@\S+\.\S+/.test(form.email)) e.email = 'Invalid email';
    if (!form.service.trim()) e.service = 'Required';
    return e;
  }

  async function handleSubmit(ev) {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length > 0) {setErrors(e);return;}
    setSubmitError('');
    setSubmitting(true);
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          access_key: WEB3FORMS_ACCESS_KEY,
          subject: 'New Service Request — DK Services Website',
          from_name: 'DK Services Website',
          name: form.name,
          phone: form.phone,
          email: form.email,
          vehicle: form.vehicle,
          service: form.service,
          message: form.message
        })
      });
      const data = await res.json();
      if (data.success) {
        setSubmitted(true);
      } else {
        setSubmitError(data.message || 'Something went wrong. Please call us or try again.');
      }
    } catch (err) {
      setSubmitError('Network error. Please check your connection or call us directly.');
    } finally {
      setSubmitting(false);
    }
  }

  const inputStyle = { width: '100%', background: '#1a1a1a', border: '1px solid #333', color: '#fff', padding: '14px 16px', fontSize: 16, fontFamily: 'Inter, sans-serif', outline: 'none', transition: 'border-color 0.2s', minHeight: 50 };
  const labelStyle = { fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 600, fontSize: 12, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#888', display: 'block', marginBottom: 6 };
  const fieldStyle = { marginBottom: 18 };
  const SERVICES_LIST = ['Fleet Maintenance', 'Engine Diagnostics & Repair', 'Heavy Line & Internal Engine', 'High Performance Upgrades', 'Steering & Suspension', 'Cooling System Service', 'Transmission Diagnostics', 'Differential Diagnostics', 'A/C System Repair', 'Other'];

  return (
    <section id="contact" className="section-pad" style={{ background: '#111', borderTop: '1px solid #1e1e1e' }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 clamp(16px,3vw,24px)' }}>
        <div style={{ marginBottom: 'clamp(40px,5vw,64px)' }}>
          <div style={{ fontFamily: 'Barlow Condensed, sans-serif', fontSize: 13, fontWeight: 600, letterSpacing: '0.25em', color: accent, textTransform: 'uppercase', marginBottom: 12 }}>Reach Out</div>
          <h2 style={{ fontFamily: 'Bebas Neue, sans-serif', fontSize: 'clamp(36px,5vw,64px)', letterSpacing: '0.02em' }}>Get In Touch</h2>
          <div style={{ width: 56, height: 3, background: accent, marginTop: 20 }} />
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(min(100%,300px), 1fr))', gap: 'clamp(40px,6vw,64px)' }}>
          {/* Contact Info */}
          <div>
            <h3 style={{ fontFamily: 'Bebas Neue, sans-serif', fontSize: 'clamp(22px,2.5vw,28px)', letterSpacing: '0.04em', marginBottom: 28 }}>Contact Information</h3>
            {[
            { name: 'Email', email: 'bellis@dkservicesco.com', emailhref: 'mailto:bellis@dkservicesco.com' }].
            map((person, i) =>
            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 14, marginBottom: 20, paddingBottom: 20, borderBottom: '1px solid #1e1e1e' }}>
                <span style={{ color: accent, marginTop: 2, flexShrink: 0 }}><Icon name="mail" size={17} /></span>
                <div>
                  <div style={{ fontFamily: 'Barlow Condensed, sans-serif', fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase', color: '#666', marginBottom: 5 }}>{person.name}</div>
                  <a href={person.emailhref} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: '#888', transition: 'color 0.2s', minHeight: 28 }}
                onMouseEnter={(e) => e.currentTarget.style.color = accent} onMouseLeave={(e) => e.currentTarget.style.color = '#888'}>
                    <Icon name="mail" size={13} />{person.email}
                  </a>
                </div>
              </div>
            )}
            {[
            { icon: 'phone', label: 'Phone', value: '(404) 430-7991', href: 'tel:4044307991' },
            { icon: 'pin', label: 'Location', value: '522 Buncombe-Waco Rd, Waco, GA 30182', href: 'https://maps.app.goo.gl/anTZ8EBXGVk8jonx6' },
            { icon: 'clock', label: 'Hours', value: 'Mon–Fri: 7:00 AM – 5:00 PM', href: null }].
            map((item, i) =>
            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 14, marginBottom: 20, paddingBottom: 20, borderBottom: '1px solid #1e1e1e' }}>
                <span style={{ color: accent, marginTop: 2, flexShrink: 0 }}><Icon name={item.icon} size={17} /></span>
                <div>
                  <div style={{ fontFamily: 'Barlow Condensed, sans-serif', fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase', color: '#666', marginBottom: 4 }}>{item.label}</div>
                  {item.href ?
                <a href={item.href} target="_blank" rel="noopener noreferrer" style={{ fontSize: 14, color: '#ddd', transition: 'color 0.2s', minHeight: 28, display: 'block' }} onMouseEnter={(e) => e.target.style.color = accent} onMouseLeave={(e) => e.target.style.color = '#ddd'}>{item.value}</a> :
                <span style={{ fontSize: 14, color: '#888' }}>{item.value}</span>
                }
                </div>
              </div>
            )}
            <div style={{ width: '100%', height: 200, marginTop: 12, overflow: 'hidden' }}>
              <iframe title="DK Diesel Location" width="100%" height="200"
              style={{ border: 0, display: 'block', filter: 'grayscale(1) invert(0.9) contrast(0.85)' }}
              loading="lazy" allowFullScreen referrerPolicy="no-referrer-when-downgrade"
              src="https://maps.google.com/maps?q=D%26K+Services+Co,+522+Buncombe-Waco+Rd,+Waco,+GA+30182&output=embed&z=15">
              </iframe>
            </div>
          </div>
          {/* Form */}
          <div>
            <h3 style={{ fontFamily: 'Bebas Neue, sans-serif', fontSize: 'clamp(22px,2.5vw,28px)', letterSpacing: '0.04em', marginBottom: 28 }}>Schedule Service</h3>
            {submitted ?
            <div style={{ background: '#1a1f1a', border: '1px solid #2a402a', padding: 40, textAlign: 'center' }}>
                <div style={{ color: '#4caf50', marginBottom: 16 }}><Icon name="check" size={40} /></div>
                <h4 style={{ fontFamily: 'Bebas Neue, sans-serif', fontSize: 28, marginBottom: 10 }}>Message Sent!</h4>
                <p style={{ color: '#888', fontSize: 15 }}>We'll be in touch shortly. For urgent needs, call Brandon or Marcus directly.</p>
              </div> :

            <form onSubmit={handleSubmit} noValidate>
                <div className="form-two-col">
                  <div style={fieldStyle}>
                    <label style={labelStyle}>Name *</label>
                    <input style={{ ...inputStyle, borderColor: errors.name ? '#c0392b' : '#333' }} value={form.name}
                  onChange={(e) => setForm({ ...form, name: e.target.value })}
                  onFocus={(e) => e.target.style.borderColor = accent}
                  onBlur={(e) => e.target.style.borderColor = errors.name ? '#c0392b' : '#333'} />
                    {errors.name && <div style={{ color: '#c0392b', fontSize: 12, marginTop: 4 }}>{errors.name}</div>}
                  </div>
                  <div style={fieldStyle}>
                    <label style={labelStyle}>Phone</label>
                    <input style={inputStyle} value={form.phone}
                  onChange={(e) => setForm({ ...form, phone: e.target.value })}
                  onFocus={(e) => e.target.style.borderColor = accent}
                  onBlur={(e) => e.target.style.borderColor = '#333'} />
                  </div>
                </div>
                <div style={fieldStyle}>
                  <label style={labelStyle}>Email *</label>
                  <input type="email" style={{ ...inputStyle, borderColor: errors.email ? '#c0392b' : '#333' }} value={form.email}
                onChange={(e) => setForm({ ...form, email: e.target.value })}
                onFocus={(e) => e.target.style.borderColor = accent}
                onBlur={(e) => e.target.style.borderColor = errors.email ? '#c0392b' : '#333'} />
                  {errors.email && <div style={{ color: '#c0392b', fontSize: 12, marginTop: 4 }}>{errors.email}</div>}
                </div>
                <div style={fieldStyle}>
                  <label style={labelStyle}>Vehicle (Year / Make / Model)</label>
                  <input style={inputStyle} placeholder="e.g. 2020 Ford F-250 Power Stroke" value={form.vehicle}
                onChange={(e) => setForm({ ...form, vehicle: e.target.value })}
                onFocus={(e) => e.target.style.borderColor = accent}
                onBlur={(e) => e.target.style.borderColor = '#333'} />
                </div>
                <div style={fieldStyle}>
                  <label style={labelStyle}>Service Needed *</label>
                  <select style={{ ...inputStyle, borderColor: errors.service ? '#c0392b' : '#333' }} value={form.service}
                onChange={(e) => setForm({ ...form, service: e.target.value })}
                onFocus={(e) => e.target.style.borderColor = accent}
                onBlur={(e) => e.target.style.borderColor = errors.service ? '#c0392b' : '#333'}>
                    <option value="">Select a service...</option>
                    {SERVICES_LIST.map((s) => <option key={s} value={s}>{s}</option>)}
                  </select>
                  {errors.service && <div style={{ color: '#c0392b', fontSize: 12, marginTop: 4 }}>{errors.service}</div>}
                </div>
                <div style={fieldStyle}>
                  <label style={labelStyle}>Message</label>
                  <textarea style={{ ...inputStyle, resize: 'vertical', minHeight: 110 }} value={form.message}
                onChange={(e) => setForm({ ...form, message: e.target.value })}
                onFocus={(e) => e.target.style.borderColor = accent}
                onBlur={(e) => e.target.style.borderColor = '#333'}
                placeholder="Describe the issue or service you need..." />
                </div>
                <button type="submit" disabled={submitting}
              style={{ background: accent, color: '#fff', fontFamily: 'Barlow Condensed, sans-serif', fontWeight: 700, fontSize: 'clamp(14px,1.4vw,16px)', letterSpacing: '0.1em', textTransform: 'uppercase', padding: '16px 40px', width: '100%', minHeight: 52, transition: 'filter 0.2s', opacity: submitting ? 0.6 : 1, cursor: submitting ? 'wait' : 'pointer' }}
              onMouseEnter={(e) => e.currentTarget.style.filter = 'brightness(1.15)'}
              onMouseLeave={(e) => e.currentTarget.style.filter = 'brightness(1)'}>
                {submitting ? 'Sending…' : 'Submit Request'}</button>
                {submitError && <div style={{ color: '#c0392b', fontSize: 14, marginTop: 14, textAlign: 'center' }}>{submitError}</div>}
              </form>
            }
          </div>
        </div>
      </div>
    </section>);

}
